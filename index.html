<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="You are invited." />
  <meta name="color-scheme" content="light" />
  <meta name="google" content="notranslate" />
  <title>The Wedding of Fathrial &amp; Inneke</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />
</head>
<body>
  <div class="page">
    <div class="page-bg" aria-hidden="true"></div>
    <div class="page-layout">
      <!-- Desktop sidebar -->
      <aside class="sidebar">
        <div class="sidebar-inner">
          <h2 data-bind="sidebar.title">UNDANGAN PERNIKAHAN</h2>
          <p class="sidebar-couple" data-bind="sidebar.couple">Fathrial &amp; Inneke</p>
          <p class="sidebar-date" data-bind="sidebar.date">04 JULI 2026</p>
        </div>
      </aside>

      <main class="main">
        <!-- COVER -->
        <section id="cover" class="section">
          <div class="section-bg"></div>
          <div class="cover-content">
            <h2 class="cover-title elementor-invisible animated-slow" data-animation="fadeInUp" data-bind="cover.title">The Wedding of</h2>
            <h2 class="cover-couple elementor-invisible animated-slow" data-animation="fadeInDown" data-bind="couple.labelCover">Rangga &amp; Cinta</h2>
            <h2 class="cover-salutation elementor-invisible animated-slow" data-animation="fadeIn" data-bind="cover.salutation">Kepada Yth. Bapak/ Ibu/ Saudara/ i</h2>
            <h2 class="cover-guest elementor-invisible animated-slow namatamu" data-animation="fadeIn" data-fill-param="to">Tamu Undangan</h2>
            <div id="cover-btn-wrap" class="cover-btn-wrap elementor-invisible animated-slow" data-animation="fadeInUp" data-animation-delay="300" style="animation-delay:300ms">
              <a id="btn-cover" href="#ayatsuci" class="btn" data-bind="cover.button">OPEN INVITATION</a>
            </div>
          </div>
        </section>

        <!-- AYAT SUCI -->
        <section id="ayatsuci" class="section">
          <div class="ayat-container text-center elementor-invisible animated-slow" data-animation="fadeIn" data-animation-delay="300">
            <img class="ayat-photo" data-src="assets.ayatPhoto" alt="" />
            <div class="ayat-text-block">
              <p class="ayat-text" data-bind="ayat.text"></p>
              <p class="ayat-source"><b data-bind="ayat.source">QS Ar-Rum 21</b></p>
            </div>
          </div>
        </section>

        <!-- PROFILE -->
        <section id="profil" class="section">
          <div class="section-bg"></div>
          <div class="section-inner text-center">
            <div class="profile-text-box">
              <h2 class="profile-greeting elementor-invisible animated-slow" data-animation="fadeInDown" data-bind="profile.greeting"></h2>
              <p class="profile-intro elementor-invisible animated-slow" data-animation="fadeInUp" data-bind="profile.intro"></p>
            </div>

            <div class="couple-cards">
              <div class="couple-card">
                <img class="couple-photo" data-src="assets.bridePhoto" alt="Bride" />
                <h3 class="couple-short elementor-invisible" data-animation="fadeInDown" data-bind="couple.brideShort"></h3>
                <h3 class="couple-full elementor-invisible animated-slow" data-animation="fadeIn" data-bind="couple.brideFull"></h3>
                <p class="couple-parents elementor-invisible animated-slow" data-animation="fadeInUp" data-animation-delay="400" data-bind="couple.brideParentsLabel"></p>
                <a class="couple-ig elementor-invisible animated-slow" data-animation="zoomIn" data-animation-delay="500" href="https://www.instagram.com/innekedwicahya/" data-external="true" aria-label="Instagram">
                  <i class="fab fa-instagram"></i>
                </a>
              </div>

              <div class="couple-amp elementor-invisible animated-slow" data-animation="fadeIn" data-animation-delay="600">&amp;</div>

              <div class="couple-card">
                <img class="couple-photo" data-src="assets.groomPhoto" alt="Groom" />
                <h3 class="couple-short elementor-invisible" data-animation="fadeInDown" data-bind="couple.groomShort"></h3>
                <h3 class="couple-full elementor-invisible animated-slow" data-animation="fadeIn" data-bind="couple.groomFull"></h3>
                <p class="couple-parents elementor-invisible animated-slow" data-animation="fadeInUp" data-animation-delay="400" data-bind="couple.parentsLabel"></p>
                <a class="couple-ig elementor-invisible animated-slow" data-animation="zoomIn" data-animation-delay="500" href="https://www.instagram.com/fathrialmuhamadhamdani/" target="_blank" aria-label="Instagram">
                  <i class="fab fa-instagram"></i>
                </a>
              </div>
            </div>
          </div>
        </section>

        <!-- SAVE THE DATE -->
        <section class="section save-date animated-slow" data-animation="fadeInUp" data-animation-delay="300">
          <h2 class="save-date-title elementor-invisible" data-animation="fadeInDown" data-bind="saveTheDate.title"></h2>
          <p class="save-date-sub elementor-invisible" data-animation="fadeInUp" data-bind="saveTheDate.subtitle"></p>
          <p class="save-date-couple elementor-invisible animated-slow" data-animation="fadeInDown" data-bind="saveTheDate.couple"></p>
          <p class="save-date-date elementor-invisible" data-animation="fadeInDown" data-bind="saveTheDate.date"></p>
          <div id="countdown" class="countdown animated-slow" data-animation="fadeInUp"></div>
        </section>

        <!-- EVENTS -->
        <section id="event" class="section elementor-invisible animated-slow" data-animation="fadeInUp">
          <div class="event-block">
            <img class="save-date-photo" data-src="assets.saveDatePhoto" alt="" />
            <img class="event-deco-top" data-src="assets.eventTop" alt="" />
            <div class="event-body">
              <div class="event-card">
                <h2 class="event-title" data-bind="events.akad.title"></h2>
                <p class="event-detail elementor-invisible" data-animation="fadeInDown" data-bind="events.akad.date"></p>
                <p class="event-detail elementor-invisible" data-animation="fadeInDown" data-bind="events.akad.time"></p>
                <p class="event-detail elementor-invisible" data-animation="fadeInDown" data-bind="events.akad.venue"></p>
                <p class="event-detail elementor-invisible" data-animation="fadeInDown" data-bind="events.akad.address"></p>
                <a class="btn btn-sm elementor-invisible" data-animation="fadeInUp" data-href="events.akad.mapsUrl" data-external="true">LIHAT LOKASI</a>
              </div>
              <div class="event-card">
                <h2 class="event-title" data-bind="events.resepsi.title"></h2>
                <p class="event-detail elementor-invisible" data-animation="fadeInDown" data-bind="events.resepsi.date"></p>
                <p class="event-detail elementor-invisible" data-animation="fadeInDown" data-bind="events.resepsi.time"></p>
                <p class="event-detail elementor-invisible" data-animation="fadeInDown" data-bind="events.resepsi.venue"></p>
                <p class="event-detail elementor-invisible" data-animation="fadeInDown" data-bind="events.resepsi.address"></p>
                <a class="btn btn-sm elementor-invisible" data-animation="fadeInUp" data-href="events.resepsi.mapsUrl" data-external="true">LIHAT LOKASI</a>
              </div>
            </div>
            <img class="event-deco-bottom" data-src="assets.eventBottom" alt="" />
          </div>
        </section>

        <!-- RSVP -->
        <section id="rsvp" class="section">
          <div class="section-inner rsvp-inner elementor-invisible animated-slow" data-animation="fadeInUp">
            <div class="rsvp-card">
              <img class="rsvp-photo" data-src="assets.rsvpPhoto" alt="" />
              <h2 class="rsvp-title" data-bind="rsvp.title"></h2>
              <p class="rsvp-desc" data-bind="rsvp.description"></p>
              <form id="rsvp-form" class="rsvp-form">
                <div class="form-group">
                  <label for="rsvp-name">Nama <span class="required" aria-hidden="true">*</span></label>
                  <input type="text" id="rsvp-name" name="nama" placeholder="..." required />
                </div>
                <div class="form-group">
                  <label for="rsvp-guests">Jumlah tamu (orang) <span class="required" aria-hidden="true">*</span></label>
                  <select id="rsvp-guests" name="orang" required></select>
                </div>
                <div class="form-group">
                  <label>Konfirmasi Kehadiran <span class="required" aria-hidden="true">*</span></label>
                  <div id="rsvp-attendance" class="radio-group"></div>
                </div>
                <button type="submit" class="btn rsvp-submit" data-bind="rsvp.submitLabel">SUBMIT</button>
              </form>
            </div>
          </div>
        </section>

        <!-- LIVE STREAMING
        <section class="section streaming-section">
          <h2 class="streaming-title" data-bind="streaming.title"></h2>
          <div class="video-wrap elementor-invisible" data-animation="fadeIn">
            <iframe src="https://www.youtube.com/embed/mUVU5JjnTL4" allowfullscreen loading="lazy" title="Live Streaming"></iframe>
          </div>
          <p data-bind="streaming.description"></p>
          <a class="btn elementor-invisible" data-animation="fadeInUp" data-href="streaming.youtubeUrl" data-external="true">
            <i class="fab fa-youtube"></i>
            <span data-bind="streaming.button">OPEN YOUTUBE</span>
          </a>
        </section> -->

        <!-- GALLERY -->
        <section class="section gallery-section">
          <h2 class="gallery-title elementor-invisible" data-animation="zoomIn" data-bind="gallery.title"></h2>
          <div id="gallery-grid" class="gallery-grid"></div>
          <div class="video-wrap elementor-invisible" data-animation="fadeInUp" style="margin-top:1.5rem">
            <iframe src="https://www.youtube.com/embed/WDQGR9Gqcho" allowfullscreen loading="lazy" title="Prewedding"></iframe>
          </div>
          <p class="prewedding-title elementor-invisible" data-animation="fadeInUp">
            <span data-bind="gallery.preweddingTitle"></span>
            <b data-bind="gallery.preweddingCouple"></b>
          </p>
        </section>

        <!-- KISAH CINTA -->
        <section class="section story-section">
          <h2 class="story-title elementor-invisible" data-animation="fadeInDown" data-bind="story.title"></h2>
          <div class="story-carousel elementor-invisible" data-animation="fadeIn">
            <div id="story-swiper" class="swiper">
              <div id="story-carousel" class="swiper-wrapper"></div>
            </div>
          </div>
          <div id="story-chapters"></div>
        </section>

        <!-- WEDDING GIFT -->
        <section class="section gift-section elementor-invisible animated-slow" data-animation="fadeInUp">
          <div class="gift-card">
            <h2 class="gift-title" data-bind="gift.title"></h2>
            <p class="gift-desc" data-bind="gift.description"></p>
            <a id="gift-toggle" href="#" class="btn btn-sm elementor-invisible animated-slow" data-animation="flash" data-animation-delay="1000">
              <i class="fas fa-gift"></i>
              <span id="gift-toggle-label" data-bind="gift.buttonOpen">KIRIM HADIAH</span>
            </a>
            <div id="gift-cards" class="area-gift-card">
              <div id="gift-banks"></div>
              <div class="card-info" style="transition-delay:1.3s">
                <div class="bank-holder" data-bind="gift.physical.recipient"></div>
                <div class="bank-holder" data-bind="gift.physical.address"></div>
              </div>
            </div>
          </div>
        </section>

        <!-- WISHES -->
        <section id="wishes" class="section wishes-section">
          <div class="section-bg"></div>
          <div class="section-inner elementor-invisible animated-slow" data-animation="fadeInUp">
            <div class="wishes-card">
              <div class="wishes-header">
                <h2 class="wishes-title" data-bind="wishes.title"></h2>
              </div>
              <div class="wishes-body">
                <p class="wishes-desc" data-bind="wishes.description"></p>
                <form id="wishes-form" class="wishes-form">
                  <label data-bind="wishes.nameLabel"></label>
                  <input type="text" name="wishes-name" placeholder="...*" required maxlength="50" />
                  <label data-bind="wishes.messageLabel"></label>
                  <div class="wishes-textarea-wrap">
                    <span class="wishes-char-limit" aria-hidden="true">1000</span>
                    <textarea name="wishes-message" placeholder="....." required maxlength="1000"></textarea>
                  </div>
                  <button type="submit" class="btn" data-bind="wishes.submitLabel">SEND</button>
                </form>
                <div class="wishes-feed">
                  <div class="wishes-feed-header">
                    <h3 class="wishes-feed-title" data-bind="wishes.feedTitle"></h3>
                    <span id="wishes-count" class="wishes-count" hidden>0</span>
                  </div>
                  <p id="wishes-empty" class="wishes-empty" data-bind="wishes.emptyLabel"></p>
                  <div id="wishes-list" class="wishes-list" aria-live="polite"></div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- CLOSING
        <section class="section closing-section elementor-invisible animated-slow" data-animation="slideInUp">
          <h2 class="closing-couple" data-bind="closing.couple"></h2>
          <p class="closing-credit" data-bind="closing.credit"></p>
          <p class="closing-brand">
            <a data-href="closing.brandUrl" data-external="true" data-bind="closing.brand"></a>
          </p>
        </section> -->

        <div class="footer-spacer"></div>
      </main>
    </div>
  </div>

  <!-- Audio -->
  <audio id="weddingAudio" loop></audio>
  <button id="audioButton" class="audio-fab" aria-label="Toggle music">
    <i class="fas fa-play"></i>
  </button>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" aria-label="Section navigation">
